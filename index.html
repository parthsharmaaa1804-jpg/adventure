<h2>Math Game</h2>
<div id="question"></div>
<input id="answer">
<button onclick="checkAnswer()">Submit</button>
<br><br>
<button onclick="goHome()">Back</button>
</section>

<script>
let paused=false;
function speak(text,callback){ let msg=new SpeechSynthesisUtterance(text); msg.rate=0.5; msg.onend=function(){ if(!paused && callback){ callback() } }; speechSynthesis.speak(msg) }
function pauseLesson(){ paused=true; speechSynthesis.pause() }
function resumeLesson(){ paused=false; speechSynthesis.resume() }
function openPage(id){ speechSynthesis.cancel(); paused=false; document.querySelectorAll("section").forEach(s=>s.style.display="none"); document.getElementById(id).style.display="block"; }
function goHome(){ speechSynthesis.cancel(); document.querySelectorAll("section").forEach(s=>s.style.display="none"); document.getElementById("home").style.display="block"; }

/* ABC */
let abc=[["A","Apple","🍎"],["B","Ball","⚽"],["C","Cat","🐱"],["D","Dog","🐶"],["E","Elephant","🐘"],["F","Fish","🐟"],["G","Grapes","🍇"],["H","Horse","🐴"],["I","Ice Cream","🍦"],["J","Jug","🏺"],["K","Kite","🪁"],["L","Lion","🦁"],["M","Monkey","🐒"],["N","Nest","🪺"],["O","Orange","🍊"],["P","Parrot","🦜"],["Q","Queen","👑"],["R","Rabbit","🐰"],["S","Sun","☀️"],["T","Tiger","🐯"],["U","Umbrella","☂️"],["V","Van","🚐"],["W","Watch","⌚"],["X","Xylophone","🎵"],["Y","Yak","🐂"],["Z","Zebra","🦓"]];
let abcIndex=0;
function startABC(){ speechSynthesis.cancel(); abcIndex=0; nextABC(); }
function nextABC(){ if(paused) return; if(abcIndex>=abc.length) return; let a=abc[abcIndex]; document.getElementById("abcBoard").innerHTML="<h1>"+a[0]+" for "+a[1]+"</h1><div class='bigEmoji'>"+a[2]+"</div>"; speak(a[0]+" for "+a[1],function(){ abcIndex++; nextABC(); }); }

/* ANIMALS */
let animals=[["Dog","🐶","woof"],["Cat","🐱","meow"],["Lion","🦁","roar"],["Cow","🐮","moo"],["Elephant","🐘","trumpet"],["Tiger","🐯","growl"]];
let animalIndex=0;
function startAnimals(){ speechSynthesis.cancel(); animalIndex=0; nextAnimal(); }
function nextAnimal(){ if(paused) return; if(animalIndex>=animals.length) return; let a=animals[animalIndex]; document.getElementById("animalBoard").innerHTML="<h1>"+a[0]+"</h1><div class='bigEmoji'>"+a[1]+"</div>"; speak("This is a "+a[0],function(){ speak(a[0]+" says "+a[2],function(){ animalIndex++; nextAnimal(); }); }); }

/* COLORS */
let colors=[["Red","#ff0000"],["Blue","#2196F3"],["Green","#4CAF50"],["Yellow","#FFD600"],["Orange","#ff9800"],["Purple","#9c27b0"]];
let colorIndex=0;
function startColors(){ speechSynthesis.cancel(); colorIndex=0; nextColor(); }
function nextColor(){ if(paused) return; if(colorIndex>=colors.length) return; let c=colors[colorIndex]; document.getElementById("colorBoard").innerHTML="<h1>"+c[0]+"</h1><div style='width:120px;height:80px;background:"+c[1]+";margin:auto'></div>"; speak("This colour is "+c[0],function(){ colorIndex++; nextColor(); }); }

/* SHAPES */
let shapes=[["Circle","⚪"],["Square","⬜"],["Triangle","🔺"],["Star","⭐"],["Heart","❤️"],["Diamond","🔷"]];
let shapeIndex=0;
function startShapes(){ speechSynthesis.cancel(); shapeIndex=0; nextShape(); }
function nextShape(){ if(paused) return; if(shapeIndex>=shapes.length) return; let s=shapes[shapeIndex]; document.getElementById("shapeBoard").innerHTML="<div class='bigEmoji'>"+s[1]+"</div><h1>"+s[0]+"</h1>"; speak("This shape is "+s[0],function(){ shapeIndex++; nextShape(); }); }

/* TABLES */
let tableNum, tableIndex;
function startTable(){ speechSynthesis.cancel(); tableNum=parseInt(document.getElementById("tableNumber").value); tableIndex=1; nextTable(); }
function nextTable(){ if(paused) return; if(tableIndex>10) return; let result=tableNum*tableIndex; document.getElementById("tableBoard").innerHTML="<h1>"+tableNum+" × "+tableIndex+" = "+result+"</h1>"; speak(tableNum+" times "+tableIndex+" equals "+result,function(){ tableIndex++; nextTable(); }); }

/* MATH GAME */
let num1,num2,correct;
function newQuestion(){ num1=Math.floor(Math.random()*10)+1; num2=Math.floor(Math.random()*10)+1; correct=num1+num2; document.getElementById("question").innerText=num1+" + "+num2+" = ?"; }
function checkAnswer(){ let ans=parseInt(document.getElementById("answer").value); if(ans===correct){ speak("Excellent! Correct answer."); }else{ speak("Let's solve it together.",function(){ speak(num1+" plus "+num2+" equals "+correct); }); } newQuestion(); }
newQuestion();
</script>
